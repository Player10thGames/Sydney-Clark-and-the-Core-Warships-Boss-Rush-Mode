<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sydney Clark and the Core Warships: Boss Rush Mode - A fast-paced HTML5 arcade shooter game" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Sydney Clark and the Core Warships: Boss Rush Mode</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Loading screen */
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #00d4ff;
        text-align: center;
        font-size: 24px;
        z-index: 1000;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(0, 212, 255, 0.3);
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 18px;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      /* Error screen */
      .error-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #ff0055;
        text-align: center;
        padding: 40px;
        z-index: 1000;
      }

      .error-title {
        font-size: 32px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .error-message {
        font-size: 18px;
        margin-bottom: 30px;
        max-width: 600px;
        line-height: 1.6;
      }

      .error-details {
        font-family: 'Courier New', monospace;
        background: rgba(255, 0, 85, 0.1);
        padding: 20px;
        border-radius: 8px;
        max-width: 800px;
        margin-bottom: 30px;
        text-align: left;
        overflow-x: auto;
        color: #00d4ff;
      }

      .retry-button {
        padding: 12px 30px;
        font-size: 16px;
        background: linear-gradient(135deg, #00d4ff, #0099cc);
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .retry-button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
      }

      .retry-button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">INITIALIZING GAME...</div>
      </div>
    </div>

    <!-- Main application bundle -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback error handler -->
    <script>
      window.addEventListener('error', function(event) {
        console.error('Global error:', event.error);
        showError('An unexpected error occurred', event.error?.message || 'Unknown error');
      });

      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled promise rejection:', event.reason);
        showError('An unexpected error occurred', event.reason?.message || 'Unknown error');
      });

      function showError(title, message) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div class="error-screen">
              <div class="error-title">⚠️ ${title}</div>
              <div class="error-message">
                The game failed to load. Please check the console for more details.
              </div>
              <div class="error-details">${message}</div>
              <button class="retry-button" onclick="window.location.reload()">
                Retry
              </button>
            </div>
          `;
        }
      }

      // Check for required browser APIs
      if (!window.requestAnimationFrame) {
        showError('Browser Not Supported', 'Your browser does not support requestAnimationFrame. Please use a modern browser.');
      }
    </script>
  </body>
</html>
